  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Line2 } from 'three/addons/lines/Line2.js';
    import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

    function getData() { return window.ROUTE_DATA; }
    const ROWS = 41;
    const COLORS = ["#e6194b","#3cb44b","#ffe119","#4363d8","#f58231","#911eb4","#46f0f0","#f032e6","#bcf60c","#fabebe","#008080","#e6beff","#9a6324","#fffac8","#800000","#aaffc3","#808000","#ffd8b1","#000075","#808080","#e63946","#2a9d8f","#e9c46a","#1d3557","#457b9d","#a8dadc","#f4a261","#e76f51","#2ec4b6","#ff9f1c","#011627","#fdfffc","#41ead4","#ff006e","#8338ec","#3a86ff","#fb5607","#06d6a0","#118ab2","#ef476f","#ffd166","#073b4c"];

    function latLonToVector3(lat, lon) {
      const phi = (90 - lat) * Math.PI / 180;
      const th = lon * Math.PI / 180;
      return new THREE.Vector3(
        Math.sin(phi) * Math.cos(th),
        Math.cos(phi),
        -Math.sin(phi) * Math.sin(th)
      );
    }

    function slerpSegment(v1, v2, numPoints) {
      const pts = [];
      for (let i = 0; i <= numPoints; i++) {
        const t = i / numPoints;
        const angle = Math.acos(Math.max(-1, Math.min(1, v1.dot(v2))));
        if (angle < 1e-6) {
          pts.push(v1.clone());
          continue;
        }
        const a = Math.sin((1 - t) * angle) / Math.sin(angle);
        const b = Math.sin(t * angle) / Math.sin(angle);
        pts.push(new THREE.Vector3().addVectors(v1.clone().multiplyScalar(a), v2.clone().multiplyScalar(b)).normalize());
      }
      return pts;
    }

    function routePoints(lat1, lon1, lat2, lon2, lat3, lon3, numPerSegment) {
      const v1 = latLonToVector3(lat1, lon1);
      const v2 = latLonToVector3(lat2, lon2);
      const v3 = latLonToVector3(lat3, lon3);
      const seg1 = slerpSegment(v1, v2, numPerSegment);
      const seg2 = slerpSegment(v2, v3, numPerSegment);
      return seg1.slice(0, -1).concat(seg2);
    }

    function slerpLongArc(v1, v2, numPoints) {
      const pts = [];
      const angleShort = Math.acos(Math.max(-1, Math.min(1, v1.dot(v2))));
      const angleLong = 2 * Math.PI - angleShort;
      if (angleLong < 1e-6) return [v1.clone(), v2.clone()];
      for (let i = 0; i <= numPoints; i++) {
        const t = i / numPoints;
        const a = Math.sin((1 - t) * angleLong) / Math.sin(angleLong);
        const b = Math.sin(t * angleLong) / Math.sin(angleLong);
        pts.push(new THREE.Vector3().addVectors(v1.clone().multiplyScalar(a), v2.clone().multiplyScalar(b)).normalize());
      }
      return pts;
    }

    let scene, camera, renderer, controls, routeLines = [], routeWrapLines = [], routeDots = [], routeLabelSprites = [];
    const DOT_RADIUS = 0.018;
    const LABEL_SIZE = 0.06;

    // Flat map (Leaflet) support
    const globeEl = document.getElementById("globeContainer");
    const mapEl = document.getElementById("mapContainer");
    const flatMapToggleEl = document.getElementById("flatMapToggle");
    let map = null;
    let mapLayers = [];

    function ensureMap() {
      if (map) return map;
      map = L.map("mapContainer", { worldCopyJump: true }).setView([20, 0], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);
      return map;
    }

    function clearMapRoutes() {
      if (!map) return;
      mapLayers.forEach(l => { try { map.removeLayer(l); } catch(e) {} });
      mapLayers = [];
    }

    function latLonFromVector3(v) {
      const y = Math.max(-1, Math.min(1, v.y));
      const phi = Math.acos(y);
      const lat = 90 - (phi * 180 / Math.PI);
      const lon = Math.atan2(-v.z, v.x) * 180 / Math.PI;
      return [lat, lon];
    }

    function splitDateline(latlngs) {
      const segs = [];
      let cur = [];
      for (let i = 0; i < latlngs.length; i++) {
        const p = latlngs[i];
        if (cur.length) {
          const prev = cur[cur.length - 1];
          const d = Math.abs(p[1] - prev[1]);
          if (d > 180) {
            if (cur.length >= 2) segs.push(cur);
            cur = [p];
            continue;
          }
        }
        cur.push(p);
      }
      if (cur.length >= 2) segs.push(cur);
      return segs;
    }

    function makeLabelTexture(num) {
      const c = document.createElement("canvas");
      c.width = 32;
      c.height = 32;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#1a1a1a";
      ctx.beginPath();
      ctx.arc(16, 16, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#f0c050";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = "#f0c050";
      ctx.font = "bold 20px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(num), 16, 16);
      const tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    }

    function addLabelSprite(num, worldPos) {
      const tex = num === 1 ? (window._labelTex1 || (window._labelTex1 = makeLabelTexture(1)))
        : num === 2 ? (window._labelTex2 || (window._labelTex2 = makeLabelTexture(2)))
        : (window._labelTex3 || (window._labelTex3 = makeLabelTexture(3)));
      const mat = new THREE.SpriteMaterial({ map: tex, color: 0xffffff });
      const sprite = new THREE.Sprite(mat);
      sprite.position.copy(worldPos).multiplyScalar(1.02);
      sprite.scale.set(LABEL_SIZE, LABEL_SIZE, 1);
      return sprite;
    }

    function initGlobe() {
      const container = document.getElementById("globeContainer");
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.z = 2.5;
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      const globeGeo = new THREE.SphereGeometry(1, 64, 48);
      const placeholderMat = new THREE.MeshPhongMaterial({ color: 0x1a2332, emissive: 0x0a0f14, specular: 0x222, shininess: 8 });
      let globeMesh = new THREE.Mesh(globeGeo, placeholderMat);
      scene.add(globeMesh);
      const loader = new THREE.TextureLoader();
      loader.load("earth_texture.jpg", (tex) => {
        tex.colorSpace = THREE.SRGBColorSpace;
        scene.remove(globeMesh);
        globeMesh.material.dispose();
        const globeMat = new THREE.MeshPhongMaterial({
          map: tex,
          color: 0xffffff,
          specular: 0x333333,
          shininess: 12,
          emissive: 0x222244
        });
        globeMesh = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globeMesh);
      }, undefined, () => {});
      const light = new THREE.DirectionalLight(0xffffff, 1.2);
      light.position.set(2, 2, 2);
      scene.add(light);
      const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
      fillLight.position.set(-1.5, -1, 1);
      scene.add(fillLight);
      scene.add(new THREE.AmbientLight(0xcccccc, 0.85));

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
      window.addEventListener("resize", () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });
    }

    function updateRoutes() {
      const flat = !!(flatMapToggleEl && flatMapToggleEl.checked);
      if (flat) {
        globeEl.style.display = "none";
        mapEl.style.display = "block";
        ensureMap();
        setTimeout(() => { try { map.invalidateSize(); } catch(e) {} }, 50);
      } else {
        mapEl.style.display = "none";
        globeEl.style.display = "block";
      }
      if (!scene) return;
      routeLines.forEach(line => { if (line.parent) line.parent.remove(line); line.geometry.dispose(); line.material.dispose(); });
      routeLines = [];
      routeWrapLines.forEach(line => { if (line.parent) line.parent.remove(line); line.geometry.dispose(); line.material.dispose(); });
      routeWrapLines = [];
      routeDots.forEach(mesh => { if (mesh.parent) mesh.parent.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); });
      routeDots = [];
      routeLabelSprites.forEach(s => { if (s.parent) s.parent.remove(s); s.material.dispose(); });
      routeLabelSprites = [];
      clearMapRoutes();
      const DATA = getData();
      if (!DATA || !DATA.locs || !DATA.roamy) return;
      const locCoords = DATA.locs;
      const roamyCoords = DATA.roamy;
      const resolution = new THREE.Vector2();
      renderer.getSize(resolution);
      const lineWidth = 2.5;

      for (let r = 0; r < ROWS; r++) {
        const showEl = document.getElementById("show_" + r);
        if (showEl && !showEl.checked) continue;
        const selLoc1 = document.getElementById("loc1_" + r);
        const selRoamy = document.getElementById("roamy_" + r);
        const selLoc2 = document.getElementById("loc2_" + r);
        const v1 = selLoc1 && selLoc1.value;
        const vMid = selRoamy && selRoamy.value;
        const v2 = selLoc2 && selLoc2.value;
        if (v1 === "" || vMid === "" || v2 === "") continue;
        const p1 = locCoords[parseInt(v1, 10)];
        const pMid = roamyCoords[parseInt(vMid, 10)];
        const p2 = locCoords[parseInt(v2, 10)];
        if (!p1 || !pMid || !p2) continue;
        const col = new THREE.Color(COLORS[r % COLORS.length]);
        const pts = routePoints(p1.lat, p1.lon, pMid.lat, pMid.lon, p2.lat, p2.lon, 40);

        if (!flat) {
          const pos = [];
          pts.forEach(p => { pos.push(p.x, p.y, p.z); });
          const lineGeo = new LineGeometry();
          lineGeo.setPositions(pos);
          const lineMat = new LineMaterial({ color: col, linewidth: lineWidth, resolution });
          const line = new Line2(lineGeo, lineMat);
          scene.add(line);
          routeLines.push(line);
          const connect13Long = document.getElementById("connect13Long");
          if (connect13Long && connect13Long.checked) {
            const v1 = latLonToVector3(p1.lat, p1.lon);
            const v3 = latLonToVector3(p2.lat, p2.lon);
            const wrapPts = slerpLongArc(v1, v3, 80);
            const wrapPos = [];
            wrapPts.forEach(p => { wrapPos.push(p.x, p.y, p.z); });
            const wrapGeo = new LineGeometry();
            wrapGeo.setPositions(wrapPos);
            const wrapMat = new LineMaterial({ color: col, linewidth: lineWidth, resolution, opacity: 0.85, transparent: true });
            const wrapLine = new Line2(wrapGeo, wrapMat);
            scene.add(wrapLine);
            routeWrapLines.push(wrapLine);
          }
          const points = [p1, pMid, p2];
          points.forEach((p, idx) => {
            const pos = latLonToVector3(p.lat, p.lon);
            const dot = new THREE.Mesh(
              new THREE.SphereGeometry(DOT_RADIUS, 16, 12),
              new THREE.MeshBasicMaterial({ color: col })
            );
            dot.position.copy(pos);
            scene.add(dot);
            routeDots.push(dot);
            const label = addLabelSprite(idx + 1, pos);
            scene.add(label);
            routeLabelSprites.push(label);
          });
        } else {
          ensureMap();
          const latlngs = pts.map(v => latLonFromVector3(v));
          splitDateline(latlngs).forEach(seg => {
            const pl = L.polyline(seg, { color: col.getStyle(), weight: 3, opacity: 0.85 });
            pl.addTo(map);
            mapLayers.push(pl);
          });
        }
      }
    }

    window.initGlobe = initGlobe;
    window.updateRoutes = updateRoutes;
    initGlobe();
    if (flatMapToggleEl) {
      try {
        flatMapToggleEl.checked = localStorage.getItem("roamyGlobeFlatMap") === "true";
      } catch (e) {}
    }
    updateRoutes();
    const connect13LongEl = document.getElementById("connect13Long");
    if (connect13LongEl) connect13LongEl.addEventListener("change", updateRoutes);
    if (flatMapToggleEl) flatMapToggleEl.addEventListener("change", function() {
      try { localStorage.setItem("roamyGlobeFlatMap", flatMapToggleEl.checked); } catch (e) {}
      updateRoutes();
    });
  </script>
  <script>
    (function() {
      var DATA, ROWS, COLORS, grid, vehicleIcons;
      var STAGE1_VEHICLE_COLOR = {}, ROAMY_VEHICLE_COLOR = {}, ROAMY_FIRST_LETTER = {};
      var rowLetterCells = {}, rowModeCells = {};
      var colorMap = { brown: "#8B4513", gold: "#DAA520", green: "#228B22", purple: "#7B2D8B", silver: "#999", black: "#222", blue: "#2266CC", red: "#CC2222", yellow: "#CCAA00" };
      var ROUTE_CONFIG_KEY = "roamyRouteConfigRows";
      function initFromPuzzleData(pd) {
        var s1 = pd.stage1_locations || [], s2 = pd.roamy_locations || [];
        DATA = { locs: s1.map(function(l){ return { name: l.name, lat: l.lat, lon: l.lon }; }), roamy: s2.map(function(l){ return { name: l.name, lat: l.lat, lon: l.lon }; }) };
        window.ROUTE_DATA = DATA;
        ROWS = 41;
        COLORS = ["#e6194b","#3cb44b","#ffe119","#4363d8","#f58231","#911eb4","#46f0f0","#f032e6","#bcf60c","#fabebe","#008080","#e6beff","#9a6324","#fffac8","#800000","#aaffc3","#808000","#ffd8b1","#000075","#808080","#e63946","#2a9d8f","#e9c46a","#1d3557","#457b9d","#a8dadc","#f4a261","#e76f51","#2ec4b6","#ff9f1c","#011627","#fdfffc","#41ead4","#ff006e","#8338ec","#3a86ff","#fb5607","#06d6a0","#118ab2","#ef476f","#ffd166","#073b4c"];
        s1.forEach(function(l){ if(l.vehicle_color) STAGE1_VEHICLE_COLOR[l.name]=l.vehicle_color; });
        s2.forEach(function(l){ if(l.vehicle_color) ROAMY_VEHICLE_COLOR[l.name]=l.vehicle_color; if(l.letter) ROAMY_FIRST_LETTER[l.name]=l.letter; });
        vehicleIcons = pd.row_vehicle_colors || {};
      }
      fetch("puzzle_data.json").then(function(r){ return r.ok ? r.json() : null; }).then(function(puzzleData) {
        if (!puzzleData) return;
        initFromPuzzleData(puzzleData);
        grid = document.getElementById("tripletGrid"); 
      grid.appendChild(document.createElement("div")).className = "header";
      grid.lastChild.textContent = "";
      grid.appendChild(document.createElement("div")).className = "header header-num";
      grid.lastChild.textContent = "#";
      grid.appendChild(document.createElement("div")).className = "header";
      grid.lastChild.innerHTML = '<span title="Show arc on globe">Show</span>';
      grid.appendChild(document.createElement("div")).className = "header";
      grid.lastChild.innerHTML = '<span class="col-num">1</span>Location (start)';
      grid.appendChild(document.createElement("div")).className = "header";
      grid.lastChild.innerHTML = '<span class="col-num">2</span>Roamy (middle)';
      grid.appendChild(document.createElement("div")).className = "header";
      grid.lastChild.innerHTML = '<span class="col-num">3</span>Location (end)';
      grid.appendChild(document.createElement("div")).className = "header";
      grid.lastChild.textContent = "";      // clear button column
      grid.appendChild(document.createElement("div")).className = "header";
      grid.lastChild.textContent = "Letter";
      grid.appendChild(document.createElement("div")).className = "header";
      grid.lastChild.textContent = "Mode";

      function allowedRoamyIndicesForRow(row) {
        var wantVc = (vehicleIcons[row] || [null, null, null])[1];
        if (!wantVc) return DATA.roamy.map(function(_, i) { return i; });
        var out = [];
        DATA.roamy.forEach(function(l, i) {
          if (ROAMY_VEHICLE_COLOR[l.name] === wantVc) out.push(i);
        });
        return out.length ? out : DATA.roamy.map(function(_, i) { return i; });
      }

      function allowedLocIndicesFor(row, pos) {
        var icon = (vehicleIcons[row] || [null,null,null])[pos];
        if (!icon) {
          return DATA.locs.map(function(_, i) { return i; });
        }
        var need = icon; // e.g. "brown-boat"
        var out = [];
        DATA.locs.forEach(function(l, i) {
          if (STAGE1_VEHICLE_COLOR[l.name] === need) out.push(i);
        });
        // Fallback: if filtering removed everything, allow all.
        return out.length ? out : DATA.locs.map(function(_, i) { return i; });
      }

      function makeCell(selectEl, iconCode) {
        var wrap = document.createElement("div");
        wrap.className = "cell-wrap";
        if (iconCode) {
          var parts = iconCode.split("-");
          var color = parts[0];
          var vehicle = parts[1];
          var tag = document.createElement("span");
          tag.className = "vehicle-tag";
          tag.style.background = colorMap[color] || "#888";
          tag.style.color = (color === "gold" || color === "yellow" || color === "silver") ? "#222" : "#fff";
          tag.textContent = vehicle;
          tag.title = color + " " + vehicle;
          wrap.appendChild(tag);
        }
        wrap.appendChild(selectEl);
        return wrap;
      }
      function roamyModeForIndex(idx) {
        if (idx <= 0 || idx >= DATA.roamy.length) {
          if (idx === 0) return "CAR"; // manistee example row 0
          return "";
        }
        if (idx >= 0 && idx <= 14) return "CAR";
        if (idx >= 15 && idx <= 23) return "HORSE";
        return "PLANE";
      }

      function updateRowLetter(r) {
        var letterCell = rowLetterCells[r];
        var modeCell = rowModeCells[r];
        if (!letterCell || !modeCell) return;
        if (r === 0) {
          letterCell.textContent = "";
          letterCell.title = "";
          modeCell.textContent = "";
          modeCell.title = "";
          return;
        }
        var s2 = document.getElementById("roamy_" + r);
        if (!s2 || s2.value === "") {
          letterCell.textContent = "";
          letterCell.title = "";
          modeCell.textContent = "";
          modeCell.title = "";
          return;
        }
        var idx = parseInt(s2.value, 10);
        if (isNaN(idx) || !DATA.roamy[idx]) {
          letterCell.textContent = "";
          letterCell.title = "";
          modeCell.textContent = "";
          modeCell.title = "";
          return;
        }
        var roamyName = DATA.roamy[idx].name;
        var letter = ROAMY_FIRST_LETTER[roamyName] || "";
        var mode = roamyModeForIndex(idx);
        letterCell.textContent = letter;
        letterCell.title = roamyName + " → " + (letter || "?");
        modeCell.textContent = mode;
        modeCell.title = roamyName + " (" + (mode ? mode.toLowerCase() : "") + ")";
      }

      function getUsedRoamyIndices(excludeRow) {
        var used = new Set();
        for (var r = 0; r < ROWS; r++) {
          if (r === excludeRow) continue;
          var s2 = document.getElementById("roamy_" + r);
          if (!s2 || !s2.value) continue;
          var idx = parseInt(s2.value, 10);
          if (!isNaN(idx)) used.add(idx);
        }
        return used;
      }

      function rebuildRoamyOptions(row) {
        var s2 = document.getElementById("roamy_" + row);
        if (!s2) return;
        var current = s2.value;
        var used = getUsedRoamyIndices(row);
        var allowed = allowedRoamyIndicesForRow(row);
        var opts = ['<option value=""></option>'];
        allowed.forEach(function(i) {
          if (used.has(i) && String(i) !== current) return;
          var l = DATA.roamy[i];
          opts.push('<option value="'+i+'"'+(String(i)===current?' selected':'')+'>'+escapeHtml(l.name)+'</option>');
        });
        s2.innerHTML = opts.join("");
      }

      for (let r = 0; r < ROWS; r++) {
        const swatch = document.createElement("div");
        swatch.className = "row-swatch";
        swatch.style.backgroundColor = COLORS[r % COLORS.length];
        swatch.title = "Row " + r + " — same color on globe";
        grid.appendChild(swatch);
        const rowNum = document.createElement("div");
        rowNum.className = "row-num";
        rowNum.textContent = r;
        grid.appendChild(rowNum);
        const showCb = document.createElement("input");
        showCb.type = "checkbox";
        showCb.id = "show_" + r;
        showCb.checked = true;
        showCb.title = "Show row " + r + " arc on globe";
        showCb.style.cursor = "pointer";
        grid.appendChild(showCb);
        var icons = vehicleIcons[r] || [null, null, null];
        const s1 = document.createElement("select");
        s1.id = "loc1_" + r;
        s1.innerHTML = '<option value=""></option>' + allowedLocIndicesFor(r, 0).map(function(i) {
          var l = DATA.locs[i];
          return '<option value="'+i+'">'+escapeHtml(l.name)+'</option>';
        }).join("");
        grid.appendChild(makeCell(s1, icons[0]));
        const s2 = document.createElement("select");
        s2.id = "roamy_" + r;
        s2.innerHTML = '<option value=""></option>' + allowedRoamyIndicesForRow(r).map(function(i) {
          var l = DATA.roamy[i];
          return '<option value="'+i+'">'+escapeHtml(l.name)+'</option>';
        }).join("");
        grid.appendChild(makeCell(s2, icons[1]));
        const s3 = document.createElement("select");
        s3.id = "loc2_" + r;
        s3.innerHTML = '<option value=""></option>' + allowedLocIndicesFor(r, 2).map(function(i) {
          var l = DATA.locs[i];
          return '<option value="'+i+'">'+escapeHtml(l.name)+'</option>';
        }).join("");
        grid.appendChild(makeCell(s3, icons[2]));
        const clearBtn = document.createElement("button");
        clearBtn.className = "row-clear";
        clearBtn.type = "button";
        clearBtn.textContent = "×";
        clearBtn.title = "Clear row " + r;
        clearBtn.addEventListener("click", function() {
          s1.value = ""; s2.value = ""; s3.value = "";
          updateRowLetter(r);
          saveConfigToStorage();
          if (window.updateRoutes) window.updateRoutes();
        });
        grid.appendChild(clearBtn);
        var letterCell = document.createElement("div");
        letterCell.style.textAlign = "center";
        letterCell.style.fontFamily = "ui-monospace, monospace";
        letterCell.style.fontWeight = "700";
        letterCell.style.fontSize = "13px";
        letterCell.textContent = "";
        letterCell.title = "";
        grid.appendChild(letterCell);
        rowLetterCells[r] = letterCell;
        var modeCell = document.createElement("div");
        modeCell.style.textAlign = "center";
        modeCell.style.fontSize = "11px";
        modeCell.style.fontWeight = "600";
        modeCell.style.textTransform = "uppercase";
        modeCell.style.letterSpacing = "0.03em";
        modeCell.style.color = "#555";
        modeCell.textContent = "";
        modeCell.title = "";
        grid.appendChild(modeCell);
        rowModeCells[r] = modeCell;
        showCb.addEventListener("change", () => { saveConfigToStorage(); window.updateRoutes && window.updateRoutes(); });
        s1.addEventListener("change", () => { saveConfigToStorage(); window.updateRoutes && window.updateRoutes(); });
        s3.addEventListener("change", () => { saveConfigToStorage(); window.updateRoutes && window.updateRoutes(); });
        s2.addEventListener("change", () => { updateRowLetter(r); saveConfigToStorage(); window.updateRoutes && window.updateRoutes(); });
        s2.addEventListener("focus", () => rebuildRoamyOptions(r));
        s2.addEventListener("mousedown", () => rebuildRoamyOptions(r));
        // Initialize letters after any pre-filled config load
        updateRowLetter(r);
      }
      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function loadConfig(obj) {
        var rows = obj.rows || [];
        var nameToLocIndex = {};
        DATA.locs.forEach(function(l, i) { nameToLocIndex[l.name] = i; });
        var nameToRoamyIndex = {};
        DATA.roamy.forEach(function(l, i) { nameToRoamyIndex[l.name] = i; });
        for (var i = 0; i < 41; i++) {
          var s1 = document.getElementById("loc1_" + i), s2 = document.getElementById("roamy_" + i), s3 = document.getElementById("loc2_" + i);
          var showEl = document.getElementById("show_" + i);
          if (s1) s1.value = ""; if (s2) s2.value = ""; if (s3) s3.value = "";
          if (showEl) showEl.checked = true;
        }
        for (var i = 0; i < rows.length; i++) {
          var row = rows[i];
          var r = (typeof row.row === "number" && row.row >= 0 && row.row < 41) ? row.row : i;
          var s1 = document.getElementById("loc1_" + r), s2 = document.getElementById("roamy_" + r), s3 = document.getElementById("loc2_" + r);
          var showEl = document.getElementById("show_" + r);
          if (!s1 || !s2 || !s3) continue;
          if (row.loc1 !== undefined && row.loc1 !== "" && nameToLocIndex[row.loc1] !== undefined) s1.value = String(nameToLocIndex[row.loc1]);
          if (row.roamy !== undefined && row.roamy !== "" && nameToRoamyIndex[row.roamy] !== undefined) s2.value = String(nameToRoamyIndex[row.roamy]);
          if (row.loc2 !== undefined && row.loc2 !== "" && nameToLocIndex[row.loc2] !== undefined) s3.value = String(nameToLocIndex[row.loc2]);
          if (showEl && row.visible !== undefined) showEl.checked = !!row.visible;
        }
        for (var i = 0; i < 41; i++) updateRowLetter(i);
        if (window.updateRoutes) window.updateRoutes();
      }
      function clearHighlightClasses() {
        for (var r = 0; r < ROWS; r++) {
          ['loc1', 'roamy', 'loc2'].forEach(function(pos) {
            var sel = document.getElementById(pos + '_' + r);
            if (sel) sel.classList.remove('confirmed', 'probable', 'speculative');
          });
        }
      }
      function applyHighlightsFromConfig(obj) {
        clearHighlightClasses();
        if (!obj || !obj.rows) return;
        var rows = obj.rows;
        rows.forEach(function(row) {
          if (typeof row.row !== "number") return;
          var r = row.row;
          ['loc1', 'roamy', 'loc2'].forEach(function(pos) {
            var status = row[pos + '_status'];
            if (!status) return;
            var sel = document.getElementById(pos + '_' + r);
            if (sel && sel.value !== '') sel.classList.add(status);
          });
        });
      }
      function buildConfigObject() {
        function statusFor(pos, r) {
          var sel = document.getElementById(pos + '_' + r);
          if (!sel) return "";
          if (sel.classList.contains('confirmed')) return 'confirmed';
          if (sel.classList.contains('probable')) return 'probable';
          if (sel.classList.contains('speculative')) return 'speculative';
          return "";
        }
        var rows = [];
        for (var r = 0; r < ROWS; r++) {
          var s1 = document.getElementById("loc1_" + r);
          var s2 = document.getElementById("roamy_" + r);
          var s3 = document.getElementById("loc2_" + r);
          var loc1 = "", roamy = "", loc2 = "";
          if (s1 && s1.value !== "") {
            var i1 = parseInt(s1.value, 10);
            if (!isNaN(i1) && DATA.locs[i1]) loc1 = DATA.locs[i1].name;
          }
          if (s2 && s2.value !== "") {
            var i2 = parseInt(s2.value, 10);
            if (!isNaN(i2) && DATA.roamy[i2]) roamy = DATA.roamy[i2].name;
          }
          if (s3 && s3.value !== "") {
            var i3 = parseInt(s3.value, 10);
            if (!isNaN(i3) && DATA.locs[i3]) loc2 = DATA.locs[i3].name;
          }
          var showEl = document.getElementById("show_" + r);
          rows.push({
            row: r,
            loc1: loc1,
            roamy: roamy,
            loc2: loc2,
            visible: showEl ? showEl.checked : true,
            loc1_status: statusFor('loc1', r),
            roamy_status: statusFor('roamy', r),
            loc2_status: statusFor('loc2', r)
          });
        }
        return { rows: rows };
      }
      function saveConfigToStorage() {
        try {
          var rows = buildConfigObject().rows;
          localStorage.setItem(ROUTE_CONFIG_KEY, JSON.stringify(rows));
        } catch (e) {}
      }
        var rowsToLoad = puzzleData.rows || [];
        try {
          var saved = localStorage.getItem(ROUTE_CONFIG_KEY);
          if (saved) {
            var parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length) rowsToLoad = parsed;
          }
        } catch (e) {}
        loadConfig({ rows: rowsToLoad });
        applyHighlightsFromConfig({ rows: rowsToLoad });
      }).catch(function() {});
    })();
  </script>
</body>
</html>
