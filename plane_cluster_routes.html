<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trips by Plane — Shortest cluster routes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; }
    .site-title { padding: 10px 16px; background: #1a1a1a; border-bottom: 1px solid #333; }
    .site-title a { color: #f0c050; text-decoration: none; font-weight: bold; font-size: 1rem; }
    .site-title a:hover { text-decoration: underline; }
    .layout { display: flex; height: calc(100vh - 42px); }
    .sidebar { width: 400px; min-width: 320px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; padding: 12px; flex-shrink: 0; }
    .sidebar h2 { font-size: 1rem; color: #f0c050; margin-bottom: 10px; }
    .cluster-block { margin-bottom: 16px; }
    .cluster-block h3 { font-size: 13px; margin-bottom: 4px; cursor: pointer; }
    .cluster-block h3:hover { text-decoration: underline; }
    .tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; vertical-align: middle; }
    .tag-drive { background: #2d5a27; color: #a0e89a; }
    .tag-island { background: #5a2727; color: #e89a9a; }
    table.loc { border-collapse: collapse; font-size: 12px; width: 100%; }
    table.loc td { padding: 3px 6px; border-bottom: 1px solid #2a2a2a; }
    .loc-num { color: #f0c050; font-weight: bold; width: 18px; text-align: center; }
    .loc-city { color: #7dd3fc; cursor: pointer; }
    .loc-city:hover { text-decoration: underline; }
    .loc-word { color: #888; font-size: 11px; font-family: 'Courier New', monospace; }
    .route-order { color: #aaa; font-size: 11px; margin-top: 4px; }
    .route-dist { color: #666; font-size: 11px; }
    #map { flex: 1; }
  </style>
</head>
<body>
  <p class="site-title"><a href="index.html">&larr; ROAMY STUPID</a></p>
  <div class="layout">
    <div class="sidebar">
      <h2>Trips by Plane — Shortest routes</h2>
      <div id="sidebar"></div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const locations = [
      { n:1,  word:"ABOUTSLEDGES", phrase:"See you at",  city:"Ambanja",        country:"Madagascar",      lat:-13.6833, lon:48.4500,  cluster:"Ambanja (island)" },
      { n:2,  word:"ABSQUATULATE", phrase:"Such fun at", city:"Saint-Pierre",   country:"SPM",             lat:46.7878,  lon:-56.1777, cluster:"Saint-Pierre (island)" },
      { n:3,  word:"ECTYPOGRAPHY", phrase:"Come visit",  city:"Krasnodar",      country:"Russia",          lat:45.0353,  lon:38.9753,  cluster:"Eurasia" },
      { n:4,  word:"ELEEMOSYNARY", phrase:"Chill at",    city:"Tucumán",        country:"Argentina",       lat:-26.8083, lon:-65.2176, cluster:"South America" },
      { n:5,  word:"EPANASTROPHE", phrase:"Be well at",  city:"Derby",          country:"W. Australia",    lat:-17.3050, lon:123.6278, cluster:"Derby (island continent)" },
      { n:6,  word:"EXSANGUINOUS", phrase:"You'll love", city:"Manaus",         country:"Brazil",          lat:-3.1190,  lon:-60.0217, cluster:"South America" },
      { n:7,  word:"LAMPADEPHORE", phrase:"Go to",       city:"Pune",           country:"India",           lat:18.5204,  lon:73.8567,  cluster:"Eurasia" },
      { n:8,  word:"LIGNIPERDOUS", phrase:"Now enjoy",   city:"Hasik",          country:"Oman",            lat:17.4167,  lon:55.6833,  cluster:"Eurasia" },
      { n:9,  word:"MACHAIRODONT", phrase:"Jet on into", city:"Velingrad",      country:"Bulgaria",        lat:42.0275,  lon:24.0000,  cluster:"Eurasia" },
      { n:10, word:"NARRISCHKEIT", phrase:"Next stop:",  city:"Marrakesh",      country:"Morocco",         lat:31.6295,  lon:-7.9811,  cluster:"Africa" },
      { n:11, word:"ODORIVECTORS", phrase:"Rest up at",  city:"Orlando",        country:"Florida",         lat:28.5383,  lon:-81.3792, cluster:"North America" },
      { n:12, word:"SAPONIFIABLE", phrase:"We suggest",  city:"Charlotte",      country:"North Carolina",  lat:35.2271,  lon:-80.8431, cluster:"North America" },
      { n:13, word:"SERPENTICIDE", phrase:"Stop in at",  city:"Edmonton",       country:"Canada",          lat:53.5461,  lon:-113.4938,cluster:"North America" },
      { n:14, word:"SNALLYGASTER", phrase:"We dream of", city:"Vladivostok",    country:"Russia",          lat:43.1155,  lon:131.8855, cluster:"Eurasia" },
      { n:15, word:"TERAMORPHOUS", phrase:"So nice at",  city:"Cochabamba",     country:"Bolivia",         lat:-17.3895, lon:-66.1568, cluster:"South America" },
      { n:16, word:"WINTERBOURNE", phrase:"Pop into",    city:"Tacurong",       country:"Philippines",     lat:6.6928,   lon:124.6764, cluster:"Tacurong (island)" }
    ];

    const clusterOrder = [
      "Eurasia",
      "North America",
      "South America",
      "Africa",
      "Ambanja (island)",
      "Saint-Pierre (island)",
      "Derby (island continent)",
      "Tacurong (island)"
    ];
    const clusterColors = {
      "Eurasia":                "#e6194b",
      "North America":          "#3cb44b",
      "South America":          "#ffe119",
      "Africa":                 "#f58231",
      "Ambanja (island)":       "#911eb4",
      "Saint-Pierre (island)":  "#46f0f0",
      "Derby (island continent)":"#4363d8",
      "Tacurong (island)":      "#f032e6"
    };
    const clusterMeta = {
      "Eurasia":                { tag:"tag-drive",  label:"DRIVABLE", note:"Krasnodar ↔ Velingrad ↔ Pune ↔ Hasik ↔ Vladivostok across Eurasian roads" },
      "North America":          { tag:"tag-drive",  label:"DRIVABLE", note:"Orlando ↔ Charlotte ↔ Edmonton via US/Canadian highways" },
      "South America":          { tag:"tag-drive",  label:"DRIVABLE", note:"Tucumán ↔ Cochabamba ↔ Manaus via Pan-American & Brazilian roads" },
      "Africa":                 { tag:"tag-drive",  label:"SOLO",     note:"Marrakesh — African mainland, no road to Europe (Gibraltar strait)" },
      "Ambanja (island)":       { tag:"tag-island", label:"ISLAND",   note:"Madagascar — island, no road connection" },
      "Saint-Pierre (island)":  { tag:"tag-island", label:"ISLAND",   note:"Saint-Pierre and Miquelon — small island off Newfoundland" },
      "Derby (island continent)":{ tag:"tag-island",label:"ISLAND",   note:"Australia — island continent" },
      "Tacurong (island)":      { tag:"tag-island", label:"ISLAND",   note:"Philippines — island archipelago" }
    };

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function nearestNeighborTSP(locs) {
      if (locs.length <= 1) return locs.slice();
      let best = null, bestDist = Infinity;
      for (let start = 0; start < locs.length; start++) {
        const remaining = new Set(locs.map((_, i) => i));
        const path = [start]; remaining.delete(start);
        let totalDist = 0;
        while (remaining.size > 0) {
          const cur = path[path.length - 1];
          let nearest = -1, nearDist = Infinity;
          for (const idx of remaining) {
            const d = haversine(locs[cur].lat, locs[cur].lon, locs[idx].lat, locs[idx].lon);
            if (d < nearDist) { nearDist = d; nearest = idx; }
          }
          path.push(nearest); remaining.delete(nearest); totalDist += nearDist;
        }
        if (totalDist < bestDist) { bestDist = totalDist; best = path; }
      }
      return best.map(i => locs[i]);
    }

    function twoOpt(ordered) {
      if (ordered.length <= 3) return ordered;
      let route = ordered.slice(), improved = true;
      while (improved) {
        improved = false;
        for (let i = 0; i < route.length - 1; i++) {
          for (let j = i + 2; j < route.length; j++) {
            const d1 = haversine(route[i].lat, route[i].lon, route[i+1].lat, route[i+1].lon);
            const d2 = (j+1<route.length) ? haversine(route[j].lat, route[j].lon, route[j+1].lat, route[j+1].lon) : 0;
            const d3 = haversine(route[i].lat, route[i].lon, route[j].lat, route[j].lon);
            const d4 = (j+1<route.length) ? haversine(route[i+1].lat, route[i+1].lon, route[j+1].lat, route[j+1].lon) : 0;
            if (d3 + d4 < d1 + d2) {
              route = [...route.slice(0,i+1), ...route.slice(i+1,j+1).reverse(), ...route.slice(j+1)];
              improved = true;
            }
          }
        }
      }
      return route;
    }

    const groups = {};
    clusterOrder.forEach(c => groups[c] = []);
    locations.forEach(loc => groups[loc.cluster].push(loc));

    const routes = {};
    clusterOrder.forEach(c => {
      const locs = groups[c];
      if (locs.length <= 2) { routes[c] = locs; return; }
      routes[c] = twoOpt(nearestNeighborTSP(locs));
    });

    const map = L.map('map', { worldCopyJump: true }).setView([15, 20], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18
    }).addTo(map);

    const allMarkers = [];
    const sidebarEl = document.getElementById('sidebar');

    clusterOrder.forEach(cluster => {
      const route = routes[cluster];
      if (!route.length) return;
      const color = clusterColors[cluster];
      const meta = clusterMeta[cluster];

      if (route.length > 1) {
        const coords = route.map(loc => [loc.lat, loc.lon]);
        L.polyline(coords, { color, weight: 3, opacity: 0.8 }).addTo(map);
      }

      const markers = [];
      route.forEach((loc, i) => {
        const numIcon = L.divIcon({
          className: '',
          html: '<div style="background:'+color+';color:#fff;font-weight:bold;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.5)">'+(i+1)+'</div>',
          iconSize: [22,22], iconAnchor: [11,11]
        });
        const marker = L.marker([loc.lat, loc.lon], { icon: numIcon }).addTo(map);
        marker.bindPopup('<b style="color:'+color+'">'+cluster+' stop '+(i+1)+'</b><br><b>'+loc.city+', '+loc.country+'</b><br><span style="color:#888">'+loc.word+'</span>');
        markers.push(marker); allMarkers.push(marker);
      });

      let totalKm = 0;
      for (let i = 0; i < route.length - 1; i++) totalKm += haversine(route[i].lat, route[i].lon, route[i+1].lat, route[i+1].lon);

      const block = document.createElement('div');
      block.className = 'cluster-block';
      let shtml = '<h3 style="color:'+color+'" onclick="zoomCluster('+JSON.stringify(route.map(l=>[l.lat,l.lon]))+')">'+cluster+' ('+route.length+')<span class="tag '+meta.tag+'">'+meta.label+'</span></h3>';
      shtml += '<p style="color:#666;font-size:11px;margin-bottom:4px">'+meta.note+'</p>';
      shtml += '<table class="loc">';
      route.forEach((loc, i) => {
        shtml += '<tr><td class="loc-num" style="color:'+color+'">'+(i+1)+'</td><td class="loc-city" onclick="zoomTo('+loc.lat+','+loc.lon+')">'+loc.city+', '+loc.country+'</td><td class="loc-word">'+loc.word+'</td></tr>';
      });
      shtml += '</table>';
      shtml += '<div class="route-order">Route: '+route.map((l,i)=>(i+1)+'. '+l.city).join(' → ')+'</div>';
      if (route.length > 1) shtml += '<div class="route-dist">Total: ~'+Math.round(totalKm).toLocaleString()+' km (straight line)</div>';
      shtml += '<div class="route-order">Words: '+route.map(l=>l.word).join(', ')+'</div>';
      shtml += '<div class="route-order">First letters (route order): <b>'+route.map(l=>l.word[0]).join('')+'</b></div>';
      block.innerHTML = shtml;
      sidebarEl.appendChild(block);
    });

    const allGroup = L.featureGroup(allMarkers);
    map.fitBounds(allGroup.getBounds().pad(0.1));

    window.zoomTo = function(lat, lon) { map.setView([lat, lon], 6); };
    window.zoomCluster = function(coords) {
      if (coords.length === 1) { map.setView(coords[0], 6); return; }
      map.fitBounds(L.latLngBounds(coords).pad(0.15));
    };
  </script>
</body>
</html>
